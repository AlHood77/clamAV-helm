{{- if eq .Values.workload.type "daemonset" }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "clamav.fullname" . }}
  namespace: {{ include "clamav.namespace" . }}
  labels:
    {{- include "clamav.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "clamav.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: {{ .Values.daemonset.updateStrategy.type }}
  template:
    metadata:
      labels:
        {{- include "clamav.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "clamav.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "clamav.freshclamInitContainer" . | nindent 8 }}
      containers:
        {{- include "clamav.clamdContainer" . | nindent 8 }}
        {{- include "clamav.freshclamContainer" . | nindent 8 }}
      volumes:
        {{- include "clamav.commonVolumes" . | nindent 8 }}
        {{- include "clamav.definitionsVolume" . | nindent 8 }}
        {{- if .Values.daemonset.hostScanning.enabled }}
        # Node root filesystem — mounted read-only for node-level AV scanning
        - name: host-root
          hostPath:
            path: {{ .Values.daemonset.hostScanning.hostPath }}
            type: Directory
        {{- end }}
{{- end }}
