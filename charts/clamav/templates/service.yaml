{{- if .Values.service.headless.enabled }}
# Headless service — required by StatefulSet for pod identity
# gives each pod a stable DNS name:
# clamav-0.clamav-headless.clamav-system.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clamav.fullname" . }}-headless
  namespace: {{ include "clamav.namespace" . }}
  labels:
    {{- include "clamav.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "clamav.selectorLabels" . | nindent 4 }}
  ports:
    - name: clamd
      port: {{ .Values.service.main.port }}
      targetPort: {{ .Values.service.main.port }}
{{- end }}
---
{{- if .Values.service.main.enabled }}
# ClusterIP service — clients connect here, load-balanced across ready pods
# clamav.clamav-system.svc.cluster.local:3310
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clamav.fullname" . }}
  namespace: {{ include "clamav.namespace" . }}
  labels:
    {{- include "clamav.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.main.type }}
  selector:
    {{- include "clamav.selectorLabels" . | nindent 4 }}
  ports:
    - name: clamd
      port: {{ .Values.service.main.port }}
      targetPort: {{ .Values.service.main.port }}
      protocol: TCP
{{- end }}
