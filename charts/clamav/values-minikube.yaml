# Minikube / local development overrides.
# Sized to fit in a default minikube VM (2GB RAM).
# Usage: helm install clamav ./charts/clamav -f charts/clamav/values-minikube.yaml

# Disable the chart-managed namespace — let helm's --create-namespace handle it.
# The chart's namespace.yaml does a CREATE on fresh install which fails if the
# namespace already exists (e.g. from a previous failed attempt). --create-namespace
# is idempotent and avoids this conflict.
namespace:
  create: false
  name: clamav-system

clamd:
  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1"

freshclam:
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "150m"

freshclamInit:
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"

# Override the full freshclam config to disable TestDatabases.
# freshclam takes the FIRST occurrence of a directive so extraConfig appends
# can't override it — a full config block replacement is needed instead.
# TestDatabases loads the entire DB into memory to validate it before going live,
# which OOM-kills the init container on a constrained VM. Safe to skip locally.
config:
  freshclam: |
    DatabaseDirectory /var/lib/clamav
    DatabaseMirror database.clamav.net
    Checks 24
    LogTime yes
    Foreground yes
    TestDatabases no
    NotifyClamd /etc/clamav/clamd.conf
